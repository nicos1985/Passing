{% extends 'base.html'%}
{% load static %}
{% load i18n %}

{% block content %}
<div class ='justify-content-sm-center' style="margin-top: 80px;">
<div class="d-flex justify-content-center" >

    <div class="card center">
            <div class="card-title">
                <div class="container" style="height: 85px; padding-top: 20px; ">
                    <h2><i class="fas fa-upload" ></i>   {% trans "Importacion masiva de contraseñas" %}</h2>
                    
                </div>
            </div>

            <div class="card-body "style="background-color: #F7F7F7; width: 40rem;">


                    <form class = 'form' method="POST" action="{% url 'upload-csv' %}" enctype="multipart/form-data">
                        {% csrf_token %}

                    {{form.as_p}}
                        <div class="text-center">
                        <button type="submit" class="btn btn-primary btn-flat" style="margin-top:20px;">
                            <i class="fas fa-upload"></i> {% trans "Enviar" %}
                        </div>
                            
                        </form>

                        
                        
                        
                    
            </div>
            <div class="card-footer text-center">
                <p>Descarga un archivo de ejemplo: 
                    <a href="{% static 'plantilla_upload_contrasenas.csv' %}" class="btn btn-success"><i class="fas fa-download"></i>  {% trans "Descargar plantilla" %}</a>
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
