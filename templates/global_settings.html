{% extends 'base.html'%}


{% block content %}
<div class ='justify-content-sm-center' style="margin-top: 80px;">
<div class="d-flex justify-content-center" >

    <div class="card center">
            <div class="card-title">
                <div class="container" style="height: 85px; padding-top: 20px; ">
                    <h2><i class="fas fa-sign-in-alt" ></i>   Configuracion Global</h2>
                    
                </div>
            </div>

            <div class="card-body "style="background-color: #F7F7F7; width: 35rem;">


                    <form class = 'form' method="POST" action="{% url 'configuracion-global' object.pk %}">
                        {% csrf_token %}

                    {{form.as_p}}

                        <button type="submit" class="btn btn-primary btn-flat" style="margin-top:20px;">
                            <i class="fas fa-save"></i> Guardar

                            
                        </form>
                        
                        
                    
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
