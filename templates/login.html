{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-5">
      <div class="card shadow-sm" style="border-radius:1rem;">
        <div class="card-body p-4">
          <h1 class="h4 mb-3 text-center">Ingresá a tu cuenta</h1>

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} py-2">{{ message }}</div>
            {% endfor %}
          {% endif %}

          <form method="post" class="mb-3">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next|default:'/' }}">
            <div class="mb-3">
              <label for="id_identity" class="form-label">Email o usuario</label>
              <input id="id_identity" name="identity" type="text" class="form-control"
                     value="{{ form.identity.value|default_if_none:'' }}" required autofocus>
            </div>
            <div class="mb-2">
              <label for="id_password" class="form-label">Contraseña</label>
              <input id="id_password" name="password" type="password" class="form-control" required autocomplete="current-password">
            </div>
            <div class="d-grid gap-2 mt-3">
              <button class="btn btn-primary" type="submit">Ingresar</button>
            </div>
          </form>

          <div class="text-muted my-3 d-flex align-items-center">
            <span class="flex-grow-1" style="border-bottom:1px solid #dee2e6;"></span>
            <span class="px-2">o</span>
            <span class="flex-grow-1" style="border-bottom:1px solid #dee2e6;"></span>
          </div>

          <form method="get" action="{% url 'google_start_auto' %}">
            <input type="hidden" name="next" value="{{ next|default:'/' }}">
            <button type="submit" class="btn btn-outline-dark w-100">
              <img src="{% static 'img/google.svg' %}" alt="" width="18" class="me-2">
              Continuar con Google
            </button>
          </form>

        </div>
      </div>
      <p class="text-center text-muted mt-3" style="font-size:.9rem">
        Si tu usuario pertenece a un solo tenant, te derivamos automáticamente.
      </p>
    </div>
  </div>
</div>
{% endblock %}
