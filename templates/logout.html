{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class='justify-content-sm-center' style="margin-top: 80px;">
    <div class="d-flex justify-content-center">
        <div class="card center">
            <div class="card-title">
                <div class="container" style="height: 105px; padding-top: 20px;">
                    <h2><i class="fa-solid fa-right-from-bracket"></i> {{ title }}</h2>
                </div>
            </div>

            <div class="card-body" style="background-color: #F7F7F7; width: 26rem;">
                <h4>{% trans "Has terminado la sesión" %}</h4>
            </div>
        </div>
    </div>
</div>
{% endblock %}
