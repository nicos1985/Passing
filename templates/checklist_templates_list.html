{% extends 'base.html' %}
{% block content %}
<h1>Plantillas de checklist</h1>
<div class="mb-3">
  <a class="btn btn-primary" href="{% url 'checklist-template-create' %}">Crear plantilla</a>
  <a class="btn btn-secondary" href="{% url 'vendor-checklist-create' %}">Asignar plantilla a proveedor</a>
  <a class="btn btn-success" href="{% url 'vendor-evaluation-create' %}">Crear evaluación</a>
</div>
<table class="table mt-3">
  <thead><tr><th>ID</th><th>Nombre</th><th>Activa</th></tr></thead>
  <tbody>
    {% for t in object_list %}
      <tr>
        <td>{{ t.id }}</td>
        <td><a href="{% url 'checklist-template-detail' t.pk %}">{{ t.name }}</a></td>
        <td>{{ t.active }}</td>
        <td>
          <a class="btn btn-sm btn-outline-primary" title="Editar plantilla" href="{% url 'checklist-template-detail' t.pk %}"><i class="fa-solid fa-pen-to-square"></i></a>
          <a class="btn btn-sm btn-outline-secondary" title="Vincular a proveedor" href="{% url 'vendor-checklist-create' %}?template={{ t.pk }}"><i class="fa-solid fa-link"></i></a>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="3">No hay plantillas</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
